# =============================================================================
# LEGACY — READ ONLY / ARCHIVED
# Superseded by docs/api/API_CONTRACT.md (NestJS /api/v1)
# Do not implement new features against this spec.
# =============================================================================
openapi: 3.1.0
info:
  title: CaffeApp API (LEGACY — Supabase)
  description: |
    ARCHIVED — Supabase PostgREST era (Sprint 0).
    Current contract: docs/api/API_CONTRACT.md
    Real-time (historical): ADR-003 (Superseded)
  version: 1.0.0-mvp
  contact:
    name: CaffeApp Team

servers:
  - url: https://{project}.supabase.co/rest/v1
    description: Supabase PostgREST
    variables:
      project:
        default: caffeapp-dev
  - url: https://{project}.supabase.co/functions/v1
    description: Supabase Edge Functions

tags:
  - name: Auth
  - name: Branches
  - name: Tables
  - name: Menu
  - name: Orders
  - name: Payments
  - name: Employees
  - name: Shifts
  - name: Reports
  - name: Notifications

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    Role:
      type: string
      enum: [cashier, barista, manager]

    OrderStatus:
      type: string
      enum: [DRAFT, PENDING, IN_PROGRESS, READY, PAID, COMPLETED, CANCELLED]

    OrderType:
      type: string
      enum: [DINE_IN, TAKEAWAY]

    TableStatus:
      type: string
      enum: [EMPTY, OCCUPIED, MAINTENANCE]

    PaymentMethod:
      type: string
      enum: [CASH, BANK_TRANSFER, CARD, E_WALLET]

    SugarLevel:
      type: string
      enum: [NONE, LESS, NORMAL, EXTRA]

    IceLevel:
      type: string
      enum: [NONE, LESS, NORMAL, EXTRA]

    Size:
      type: string
      enum: [S, M, L]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        employee:
          $ref: '#/components/schemas/Employee'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'

    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
          nullable: true

    UserRole:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/Role'
        branch_id:
          type: string
          format: uuid
        branch_name:
          type: string

    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        is_active:
          type: boolean

    Table:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        code:
          type: string
          example: B01
        floor:
          type: string
        capacity:
          type: integer
        status:
          $ref: '#/components/schemas/TableStatus'
        locked_by:
          type: string
          format: uuid
          nullable: true

    MenuCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        sort_order:
          type: integer

    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: decimal
        image_url:
          type: string
          nullable: true
        is_available:
          type: boolean
        size_options:
          type: array
          items:
            $ref: '#/components/schemas/Size'

    OrderItemInput:
      type: object
      required: [menu_item_id, quantity]
      properties:
        menu_item_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        size:
          $ref: '#/components/schemas/Size'
        sugar_level:
          $ref: '#/components/schemas/SugarLevel'
        ice_level:
          $ref: '#/components/schemas/IceLevel'
        notes:
          type: string

    OrderItem:
      allOf:
        - $ref: '#/components/schemas/OrderItemInput'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            item_name:
              type: string
            unit_price:
              type: number
            line_total:
              type: number
            is_completed:
              type: boolean

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
          nullable: true
        order_number:
          type: string
          example: '#1024'
        order_type:
          $ref: '#/components/schemas/OrderType'
        status:
          $ref: '#/components/schemas/OrderStatus'
        payment_status:
          type: string
          enum: [UNPAID, PAID, REFUNDED]
        subtotal:
          type: number
        tax_amount:
          type: number
        total:
          type: number
        notes:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        created_at:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required: [branch_id, order_type, items]
      properties:
        branch_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        order_type:
          $ref: '#/components/schemas/OrderType'
        notes:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        status:
          type: string
          enum: [DRAFT, PENDING]
          default: PENDING

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'

    PayOrderRequest:
      type: object
      required: [method, amount]
      properties:
        method:
          $ref: '#/components/schemas/PaymentMethod'
        amount:
          type: number
        amount_received:
          type: number
          description: Required for CASH
        e_wallet_provider:
          type: string
          enum: [MOMO, ZALOPAY, VNPAY, SHOPEEPAY]

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        method:
          $ref: '#/components/schemas/PaymentMethod'
        amount:
          type: number
        change_amount:
          type: number
        status:
          type: string
        created_at:
          type: string
          format: date-time

    DashboardReport:
      type: object
      properties:
        date:
          type: string
          format: date
        total_revenue:
          type: number
        order_count:
          type: integer
        customer_count:
          type: integer
        revenue_change_percent:
          type: number
        hourly_revenue:
          type: array
          items:
            type: object
            properties:
              hour:
                type: integer
              revenue:
                type: number

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
    tags: [Auth]
    summary: Đăng nhập
    security: []
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginResponse'
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất
      operationId: logout
      responses:
        '204':
          description: Logged out

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer

  /branches:
    get:
      tags: [Branches]
      summary: Danh sách chi nhánh của user
      operationId: listBranches
      responses:
        '200':
          description: Branch list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Branch'

  /tables:
    get:
      tags: [Tables]
      summary: Sơ đồ bàn theo chi nhánh
      operationId: listTables
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: floor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Table'

  /tables/{id}:
    patch:
      tags: [Tables]
      summary: Cập nhật trạng thái bàn (manager)
      operationId: updateTable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/TableStatus'
      responses:
        '200':
          description: Updated table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'

  /menu-categories:
    get:
      tags: [Menu]
      summary: Danh mục menu
      operationId: listMenuCategories
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuCategory'

  /menu-items:
    get:
      tags: [Menu]
      summary: Danh sách món
      operationId: listMenuItems
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItem'
    post:
      tags: [Menu]
      summary: Thêm món mới (manager)
      operationId: createMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branch_id, category_id, name, price]
              properties:
                branch_id:
                  type: string
                  format: uuid
                category_id:
                  type: string
                  format: uuid
                name:
                  type: string
                price:
                  type: number
                description:
                  type: string
                image_url:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'

  /orders:
    get:
      tags: [Orders]
      summary: Danh sách đơn hàng
      operationId: listOrders
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      tags: [Orders]
      summary: Tạo đơn / Gửi bếp
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Chi tiết đơn
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Cập nhật trạng thái đơn
      operationId: updateOrderStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{id}/items/{itemId}/complete:
    patch:
      tags: [Orders]
      summary: Đánh dấu món hoàn thành (barista)
      operationId: completeOrderItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item marked complete

  /orders/{id}/pay:
    post:
      tags: [Payments]
      summary: Thanh toán đơn
      operationId: payOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayOrderRequest'
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /employees:
    get:
      tags: [Employees]
      summary: Danh sách nhân viên
      operationId: listEmployees
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'

  /employees/{id}:
    get:
      tags: [Employees]
      summary: Chi tiết nhân viên
      operationId: getEmployee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

  /shifts:
    get:
      tags: [Shifts]
      summary: Ca làm việc
      operationId: listShifts
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, CLOSED]
      responses:
        '200':
          description: Shift list

  /shifts/{id}/close:
    post:
      tags: [Shifts]
      summary: Kết ca (manager)
      operationId: closeShift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shift closed

  /reports/dashboard:
    get:
      tags: [Reports]
      summary: Dashboard doanh thu
      operationId: getDashboard
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardReport'

  /reports/revenue:
    get:
      tags: [Reports]
      summary: Báo cáo doanh thu theo khoảng ngày
      operationId: getRevenueReport
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Revenue report

  /notifications:
    get:
      tags: [Notifications]
      summary: Danh sách thông báo
      operationId: listNotifications
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: unread_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Đánh dấu đã đọc
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Marked as read
