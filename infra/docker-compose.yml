services:
  postgres:
    image: postgres:16-alpine
    container_name: caffeapp-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caffeapp
    volumes:
      - caffeapp_pg_data:/var/lib/postgresql/data

volumes:
  caffeapp_pg_data:
